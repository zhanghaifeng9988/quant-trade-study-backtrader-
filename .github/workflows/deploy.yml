name: deploy-docs
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material mkdocs-jupyter
      - run: mkdocs gh-deploy --force
