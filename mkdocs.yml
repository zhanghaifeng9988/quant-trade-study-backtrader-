site_name: 量化交易从零到一
site_url: https://Si-Xiaoming.github.io/quant-trade-tutorial/
repo_url: https://github.com/Si-Xiaoming/quant-trade-tutorial
edit_uri: edit/main/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: True
      execute: False
      no_input: False
      show_usage: False
      highlight_extra_classes: "codehilite"

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 00 环境配置:
      - 概览: 00_setup/README.md
      - 环境安装: 00_setup/00_env_setup.ipynb
  - 01 金融基础概念:
      - 概览: 01_financial_concepts/README.md
      - 数学基础: 01_financial_concepts/00_math_foundations.ipynb
      - 价格与收益: 01_financial_concepts/01_price_and_return.ipynb
      - 风险与波动率: 01_financial_concepts/02_risk_and_volatility.ipynb
      - 市场基础: 01_financial_concepts/03_market_basics.ipynb
      - 概率与模拟: 01_financial_concepts/04_probability_and_simulation.ipynb
      - GARCH 波动率: 01_financial_concepts/05_garch_volatility.ipynb
      - 统计学基础: 01_financial_concepts/06_statistics_fundamentals.ipynb
      - 时间序列分析: 01_financial_concepts/07_time_series_analysis.ipynb
      - 胖尾分布: 01_financial_concepts/08_heavy_tails.ipynb
      - 大数定律与中心极限定理: 01_financial_concepts/09_lln_clt.ipynb
      - 现值理论: 01_financial_concepts/10_present_value.ipynb
